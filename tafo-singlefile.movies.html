<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed Launcher</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
      /* Using green for the text color per your preference */
      color: green !important; 
      font-family: Arial, sans-serif;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none !important;
      transition: background-color 0.3s, transform 0.2s;
    }

    .button:hover {
      background-color: #1a1a1a !important;
    }
  </style>
</head>
<body>

  <a id="button" class="button">Launch TafoChat</a>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const button = document.getElementById('button');
      button.addEventListener('click', launch);
    });

    function launch() {
      const targetUrl = "https://cdn.jsdelivr.net/gh/TafoHubOffical/TafoHub-DONTDMCA-TafoChat-222@main/Tafo-Chat-SingleFile.html";
      
      try {
        // Fetching the raw HTML text from the CDN
        fetch(targetUrl + "?t=" + Date.now())
          .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.text();
          })
          .then(htmlContent => {
            // Opening the blank window
            const newWin = window.open("about:blank", "_blank");
            if (newWin) {
              // Injecting the fetched HTML code directly into the new window
              newWin.document.open();
              newWin.document.write(htmlContent);
              newWin.document.close();
            } else {
              alert("Pop-up blocked! Please allow pop-ups for this site.");
            }
          })
          .catch(err => {
            console.error('Fetch error:', err);
          });
      } catch (error) {
        console.error('Execution error:', error);
      }
    }
  </script>
</body>
</html>
